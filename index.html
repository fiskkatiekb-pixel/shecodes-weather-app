<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="src/style.css" />
    <title>My weather app</title>
  </head>
  <body>
    <div class="weather-app">
      <header>
        <form>
          <input type="search" placeholder="Enter a city..." required />
          <input type="submit" value="search" />
        </form>
      </header>
      <main>
        <div>
          <h1>San Francisco</h1>
          <p>
            Tuesday 14:49, scattered clouds
            <br />
            Humidity: 66%, Wind: 3.13km/h
          </p>
        </div>
        <div>🌤 12°c</div>
      </main>
      <footer>
        Coded by
        <a href="https://github.com/fiskkatiekb-pixel" target="_blank"
          >Katie Bickford
        </a>
        and is
        <a
          href="https://github.com/fiskkatiekb-pixel/shecodes-weather-app"
          target="_blank"
        >
          on Github
        </a>
        and hosted
        <a
          href="https://temperature-project-shecodes.netlify.app/"
          target="_blank"
        >
          on Netlify</a
        >
      </footer>
    </div>
  </body>
</html>
