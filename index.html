<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="src/style.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Roboto:ital,wght@0,100..900;1,100..900&display=swap"
      rel="stylesheet"
    />
    <title>My weather app</title>
  </head>
  <body>
    <div class="weather-app">
      <header>
        <form class="search-form">
          <input
            type="search"
            placeholder="Enter a city..."
            required
            class="search-form-input"
          />
          <input type="submit" value="search" class="search-form-button" />
        </form>
      </header>
      <main>
        <div>
          <h1>San Francisco</h1>
          <p>
            Tuesday 14:49, scattered clouds
            <br />
            Humidity: 66%, Wind: 3.13km/h
          </p>
        </div>
        <div>🌤 12°c</div>
      </main>
      <footer>
        Coded by
        <a href="https://github.com/fiskkatiekb-pixel" target="_blank"
          >Katie Bickford
        </a>
        and is
        <a
          href="https://github.com/fiskkatiekb-pixel/shecodes-weather-app"
          target="_blank"
        >
          on Github
        </a>
        and hosted
        <a
          href="https://temperature-project-shecodes.netlify.app/"
          target="_blank"
        >
          on Netlify</a
        >
      </footer>
    </div>
  </body>
</html>
